<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《啦啦隊股長》殺青慶功宴・搶紅包戰</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --gold: #e5b869; --yes: #154360; --no: #78281f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; text-align: center; padding: 10px; margin: 0; }
        .box { max-width: 500px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 12px; border: 2px solid var(--gold); box-sizing: border-box; box-shadow: 0 4px 15px rgba(229,184,105,0.2); }
        h1 { color: var(--gold); font-size: 26px; margin-top:0; letter-spacing: 1px; }
        .btn { width: 90%; padding: 16px; margin: 12px 0; font-size: 19px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-yes { background: var(--yes); } .btn-no { background: var(--no); }
        .hidden { display: none; }
        .badge { background: #2d2d2d; padding: 6px 12px; border-radius: 20px; font-size: 13px; display: inline-block; margin-bottom: 10px; }
        input[type="text"] { width: 85%; padding: 14px; font-size: 18px; text-align: center; border-radius: 8px; margin-bottom: 12px; background: #000; color: #fff; border: 1px solid var(--gold); }
        .player-wall { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; background: #050505; border-radius: 8px; padding: 10px; min-height: 50px; }
        .p-card { padding: 8px 15px; border-radius: 6px; font-size: 15px; font-weight: bold; }
        .p-alive-wait { background: #333; color: #aaa; }
        .p-alive-voted { background: #196f3d; color: #fff; }
        .p-dead { background: #78281f; color: #f1948a; text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="role-screen" class="box">
        <h1>《啦啦隊股長》<br>殺青慶功宴・搶紅包戰</h1>
        <p style="color: #aaa; font-size: 14px;">請選擇您在該裝置的身分：</p>
        <button class="btn" style="background:#444;" onclick="chooseRole('host')">我是遊戲主辦人 (大螢幕投影)</button>
        <button class="btn" style="background:var(--gold); color:#000;" onclick="chooseRole('player')">我是劇組參賽者 (手機端)</button>
    </div>

    <div id="input-screen" class="box hidden">
        <h1 id="input-title">初始化遊戲</h1>
        <input type="text" id="room-id" placeholder="請設定或輸入自訂 4 位數房間碼" maxlength="4" pattern="\d*"><br>
        <input type="text" id="player-name" placeholder="請輸入您的名字/綽號"><br>
        <button class="btn" style="background:var(--gold); color:#000;" onclick="submitInput()">確認進入現場</button>
    </div>

    <div id="host-screen" class="box hidden">
        <h1>《啦啦隊股長》主控台</h1>
        <div style="font-size: 30px; color: #ffdd67; font-weight: bold;">房間代碼：<span id="host-room-id">----</span></div>
        <hr style="border-color:#333; margin: 15px 0;">
        <p>當前存活：<span id="host-alive-count" style="color:var(--gold); font-size:22px; font-weight:bold;">0</span> 人 | 已投票：<span id="host-voted-count" style="color:#52be80; font-size:22px; font-weight:bold;">0</span> 人</p>
        
        <button class="btn" style="background:#52be80;" onclick="settleRound()">📢 停止卡位！現場開票！</button>
        <button class="btn" style="background:#eb984e; color:#000;" onclick="nextRound()">🎬 準備下一題！重置投票按鈕</button>
        <button class="btn" style="background:#555;" onclick="resetGame()">🔄 全員復活全局重來</button>
        
        <div style="text-align:left; color:var(--gold); font-weight:bold; margin-top:15px;">🎬 現場劇組成員狀態：</div>
        <div id="player-wall" class="player-wall"></div>

        <div id="host-result" class="box hidden" style="background:#000; margin-top:15px; border-color:#52be80;">
            <h3 id="result-winner-text" style="color:var(--gold); margin:0 0 10px 0;"></h3>
            <p style="margin:5px 0;">選擇 YES: <span id="result-yes-count" style="color:#3498db; font-weight:bold;">0</span> 人</p>
            <p style="margin:5px 0;">選擇 NO: <span id="result-no-count" style="color:#e74c3c; font-weight:bold;">0</span> 人</p>
        </div>
    </div>

    <div id="player-screen" class="box hidden">
        <h1>參賽者: <span id="display-name" style="color:var(--gold);"></span></h1>
        <div id="player-status" class="badge">遊戲載入中...</div>
        
        <div id="vote-area" class="hidden">
            <p style="color:#aaa; font-weight:bold;">請做出你的少數決抉擇：</p>
            <button class="btn btn-yes" onclick="castVote('Yes')">YES</button>
            <button class="btn btn-no" onclick="castVote('No')">NO</button>
        </div>
        
        <div id="wait-msg" class="hidden">
            <div style="color:#52be80; font-size:20px; font-weight:bold; margin: 20px 0;">✓ 抉擇已秘密鎖定！</div>
            <p style="color:#aaa;">請抬頭觀看前方大螢幕開票結果...</p>
        </div>
        
        <div id="dead-msg" class="hidden">
            <div style="color:#ec7063; font-size:24px; font-weight:bold; margin: 20px 0;">🎬 恭喜你殺青領便當！</div>
            <p style="color:#aaa;">您在本輪不幸成為多數方，請在台下好好享受酒水，幫場上的夥伴加油！</p>
        </div>
    </div>

    <script>
        // 🛠️ 請在下方引號內貼上你在第一階段複製的 Firebase 即時資料庫網址
        const FIREBASE_DB_URL = "https://lala-party-2026-default-rtdb.firebaseio.com/";

        // 初始化 Firebase
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
        const db = firebase.database();

        let currentRole = '';
        let roomRef = null;
        let myRoomCode = '';
        let myPlayerId = '';

        function chooseRole(role) {
            currentRole = role;
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('input-screen').classList.remove('hidden');
            
            if(role === 'host') {
                document.getElementById('input-title').innerText = "主辦人開啟房間";
                document.getElementById('player-name').value = "主辦方";
                document.getElementById('player-name').classList.add('hidden');
            } else {
                document.getElementById('input-title').innerText = "劇組成員進場";
                document.getElementById('player-name').classList.remove('hidden');
            }
        }

        function submitInput() {
            const roomCode = document.getElementById('room-id').value.trim();
            const name = document.getElementById('player-name').value.trim();
            
            if(!roomCode || roomCode.length !== 4) return alert('請輸入確切的 4 位數房間碼！');
            if(!name) return alert('請填寫您的稱呼！');
            
            myRoomCode = roomCode;
            roomRef = db.ref('rooms/' + myRoomCode);
            
            if(currentRole === 'host') {
                // 主辦人初始化房間數據
                roomRef.child('gameStatus').set({ roundState: 'voting', winner: '', yesCount: 0, noCount: 0 });
                document.getElementById('input-screen').classList.add('hidden');
                document.getElementById('host-screen').classList.remove('hidden');
                document.getElementById('host-room-id').innerText = myRoomCode;
                startHostListening();
            } else {
                // 參賽者加入
                myPlayerId = 'p_' + Math.random().toString(36).substr(2, 9);
                roomRef.child('players').child(myPlayerId).set({
                    name: name,
                    alive: true,
                    choice: '',
                    voted: false
                });
                
                document.getElementById('input-screen').classList.add('hidden');
                document.getElementById('player-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = name;
                startPlayerListening();
            }
        }

        // 👑 【主辦人核心監聽】
        function startHostListening() {
            roomRef.child('players').on('value', (snapshot) => {
                const players = snapshot.val() || {};
                const wall = document.getElementById('player-wall');
                wall.innerHTML = '';
                
                let aliveCount = 0;
                let votedCount = 0;
                
                for(let id in players) {
                    const p = players[id];
                    if(p.alive) aliveCount++;
                    if(p.alive && p.voted) votedCount++;
                    
                    let stateClass = 'p-alive-wait';
                    let stateTxt = '(思索中)';
                    if(!p.alive) { stateClass = 'p-dead'; stateTxt = '[領便當]'; }
                    else if(p.voted) { stateClass = 'p-alive-voted'; stateTxt = '[已鎖定]'; }
                    
                    wall.innerHTML += `<div class="p-card ${stateClass}">${p.name} ${stateTxt}</div>`;
                }
                
                document.getElementById('host-alive-count').innerText = aliveCount;
                document.getElementById('host-voted-count').innerText = votedCount;
            });
        }

        function settleRound() {
            roomRef.child('players').once('value', (snapshot) => {
                const players = snapshot.val() || {};
                let yesCount = 0;
                let noCount = 0;
                
                for(let id in players) {
                    if(players[id].alive && players[id].voted) {
                        if(players[id].choice === 'Yes') yesCount++;
                        if(players[id].choice === 'No') noCount++;
                    }
                }
                
                let winSide = 'Both';
                let winText = '⚖ 本輪平手！全員生存！';
                
                if(yesCount !== noCount) {
                    winSide = yesCount < noCount ? 'Yes' : 'No';
                    winText = `🎉 開票結果：${winSide === 'Yes' ? 'YES' : 'NO'} 是少數方！順利晉級！`;
                }
                
                // 大螢幕顯示結果
                document.getElementById('result-winner-text').innerText = winText;
                document.getElementById('result-yes-count').innerText = yesCount;
                document.getElementById('result-no-count').innerText = noCount;
                document.getElementById('host-result').classList.remove('hidden');
                
                // 更新每位玩家的死活狀態
                for(let id in players) {
                    if(players[id].alive) {
                        if(winSide !== 'Both' && players[id].choice !== winSide) {
                            roomRef.child('players').child(id).update({ alive: false });
                        }
                    }
                }
                
                // 廣播給所有人
                roomRef.child('gameStatus').update({
                    roundState: 'revealed',
                    winner: winSide,
                    yesCount: yesCount,
                    noCount: noCount
                });
            });
        }

        function nextRound() {
            document.getElementById('host-result').classList.add('hidden');
            roomRef.child('gameStatus').update({ roundState: 'voting', winner: '', yesCount: 0, noCount: 0 });
            
            roomRef.child('players').once('value', (snapshot) => {
                const players = snapshot.val() || {};
                for(let id in players) {
                    roomRef.child('players').child(id).update({ choice: '', voted: false });
                }
            });
        }

        function resetGame() {
            if(!confirm("確定要讓死去的劇組夥伴全體復活，重新來過嗎？")) return;
            document.getElementById('host-result').classList.add('hidden');
            roomRef.child('gameStatus').update({ roundState: 'voting', winner: '', yesCount: 0, noCount: 0 });
            
            roomRef.child('players').once('value', (snapshot) => {
                const players = snapshot.val() || {};
                for(let id in players) {
                    roomRef.child('players').child(id).update({ choice: '', voted: false, alive: true });
                }
            });
        }

        // 📱 【參賽者核心監聽】
        function startPlayerListening() {
            // 監聽自己的存活與投票狀態
            roomRef.child('players').child(myPlayerId).on('value', (snapshot) => {
                const me = snapshot.val();
                if(!me) return;
                
                if(!me.alive) {
                    document.getElementById('vote-area').classList.add('hidden');
                    document.getElementById('wait-msg').classList.add('hidden');
                    document.getElementById('dead-msg').classList.remove('hidden');
                    document.getElementById('player-status').innerText = "🎬 已失去資格";
                    document.getElementById('player-status').style.background = "#78281f";
                } else {
                    document.getElementById('dead-msg').classList.add('hidden');
                    if(me.voted) {
                        document.getElementById('vote-area').classList.add('hidden');
                        document.getElementById('wait-msg').classList.remove('hidden');
                        document.getElementById('player-status').innerText = "⌛ 抉擇已鎖定";
                        document.getElementById('player-status').style.background = "#196f3d";
                    } else {
                        // 只有當大螢幕在「投票中」狀態時才顯示按鈕
                        roomRef.child('gameStatus/roundState').once('value', (snap) => {
                            if(snap.val() === 'voting') {
                                document.getElementById('vote-area').classList.remove('hidden');
                                document.getElementById('wait-msg').classList.add('hidden');
                                document.getElementById('player-status').innerText = "⚡ 請選擇 YES 或 NO";
                                document.getElementById('player-status').style.background = "#2d2d2d";
                            }
                        });
                    }
                }
            });

            // 監聽大螢幕是不是進入下一輪了
            roomRef.child('gameStatus/roundState').on('value', (state) => {
                if(state === 'voting') {
                    roomRef.child('players').child(myPlayerId).once('value', (snap) => {
                        if(snap.val() && snap.val().alive) {
                            document.getElementById('vote-area').classList.remove('hidden');
                            document.getElementById('wait-msg').classList.add('hidden');
                            document.getElementById('player-status').innerText = "⚡ 請選擇 YES 或 NO";
                            document.getElementById('player-status').style.background = "#2d2d2d";
                        }
                    });
                }
            });
        }

        function castVote(choice) {
            roomRef.child('players').child(myPlayerId).update({
                choice: choice,
                voted: true
            });
        }
    </script>
</body>
</html>
